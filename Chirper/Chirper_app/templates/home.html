{% extends 'base.html' %}
{% load static %}

{% block title %}Home - Chirper{% endblock %}

{% block content %}
    <div class="max-w-3xl mx-auto px-4">
        <h1 class="text-white text-2xl text-center mb-8">Welcome to Chirper</h1>

        <h3 class="text-xl text-center mb-2" style="color: #9ca3af">New Chirp</h3>
        <section class="shadow-md mx-auto mb-8 border border-gray-300 rounded-lg p-6 hover:shadow-lg transition-shadow" style="background-color: #374151; border-color: #4b5563; color: #FFFFFF;">
            <form hx-post="{% url 'create_chirp' %}" 
                  hx-target="#chirp-list"
                  method="POST">
                {% csrf_token %}
                <div class="space-y-4">
                    <input type="text" name="title" class="bg-gray-700 border border-gray-600 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" placeholder="Title" required>
                    <textarea name="content" class="bg-gray-700 border border-gray-600 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" placeholder="Whats Happening?" required></textarea>
                    <button type="submit" class="px-4 py-2 tracking-wide text-white transition-colors duration-200 transform bg-blue-700 rounded-md hover:bg-blue-800 focus:outline-none focus:bg-blue-600">Chirp</button>
                </div>
            </form>
        </section>

        <h3 class="text-xl text-center mb-2" style="color: #9ca3af">Feed</h3>
        <div class="space-y-4">
            <div id="chirp-list">
                {% include 'chirp_list.html' %}
            </div>
        </div>
    </div>
{% endblock %}
